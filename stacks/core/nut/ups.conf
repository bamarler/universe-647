# Universe 647 — NUT UPS Configuration
# Update the section name and driver for your UPS model
# Hardware compatibility list: https://networkupstools.org/stable-hcl.html

[ups]
    driver = usbhid-ups
    port = auto
    desc = "UPS"

    # Common drivers:
    #   usbhid-ups  — most USB UPS devices (APC, CyberPower, Eaton, etc.)
    #   snmp-ups    — networked UPS with SNMP
    #   nutdrv_qx   — Megatec/Q* protocol UPS
