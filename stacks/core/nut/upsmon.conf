# Universe 647 — NUT UPS Monitor Configuration
# NOTE: This is the CONTAINER-SIDE config. The HOST also needs
# /etc/nut/upsmon.conf configured to trigger actual system shutdown.

MONITOR ups@localhost 1 monuser secret master

MINSUPPLIES 1
SHUTDOWNCMD "/sbin/shutdown -h +0"
DEADTIME 15
POLLFREQ 5
POLLFREQALERT 5
HOSTSYNC 15
FINALDELAY 5
RUN_AS_USER root
